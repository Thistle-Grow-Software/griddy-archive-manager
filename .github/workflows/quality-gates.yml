name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  quality-gates:
    uses: Thistle-Grow-Software/.github/.github/workflows/python-quality-gates.yml@main
    with:
      needs-codeartifact: true
      mypy-enabled: false
      src-paths: "gam/"
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
      codeartifact-domain: ${{ secrets.AWS_CODEARTIFACT_DOMAIN }}
      codeartifact-domain-owner: ${{ secrets.AWS_ACCOUNT_ID }}
